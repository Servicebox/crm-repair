services:
  app:
    build: .
    container_name: crm-repair-app
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/crm-repair
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/data/uploads
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: crm-repair-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  uploads:
